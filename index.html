<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice AI Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #09090f;
      --surface:     #111120;
      --surface2:    #181830;
      --border:      #252545;
      --accent:      #6c63ff;
      --accent2:     #a78bfa;
      --accent-glow: rgba(108, 99, 255, 0.35);
      --user-bubble: #1e1e3a;
      --ai-bubble:   #131328;
      --text:        #e8e8f0;
      --muted:       #7878a0;
      --success:     #34d399;
      --danger:      #f87171;
      --warning:     #fbbf24;
      --radius:      14px;
      --radius-sm:   8px;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── LAYOUT ─────────────────────────────────────── */
    #app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* ── HEADER ─────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0 14px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 18px var(--accent-glow);
    }

    .logo-text {
      display: flex; flex-direction: column;
    }

    .logo-title {
      font-size: 16px; font-weight: 700;
      background: linear-gradient(90deg, #fff 30%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-sub { font-size: 11px; color: var(--muted); letter-spacing: .4px; }

    .header-right { display: flex; align-items: center; gap: 10px; }

    #lang-badge {
      display: none;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px; font-weight: 600;
      background: rgba(108,99,255,.15);
      border: 1px solid rgba(108,99,255,.4);
      color: var(--accent2);
      letter-spacing: .5px;
    }

    #conn-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px; font-weight: 500;
      background: var(--surface2);
      border: 1px solid var(--border);
      transition: all .3s;
    }

    #conn-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background .3s;
    }

    #conn-pill.connected    #conn-dot { background: var(--success); box-shadow: 0 0 6px var(--success); }
    #conn-pill.connecting   #conn-dot { background: var(--warning); animation: blink 1s infinite; }
    #conn-pill.error        #conn-dot { background: var(--danger); }

    /* ── MAIN AREA ───────────────────────────────────── */
    main {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px 0 16px;
      overflow: hidden;
      min-height: 0;
    }

    /* ── VISUALIZER CARD ─────────────────────────────── */
    #vis-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px 22px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    #vis-card::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(108,99,255,.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Waveform bars */
    #waveform {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 52px;
    }

    .bar {
      width: 4px;
      background: var(--accent);
      border-radius: 3px;
      height: 6px;
      opacity: .35;
      transition: opacity .3s;
    }

    #waveform.active   .bar { opacity: 1; }
    #waveform.speaking .bar { background: var(--accent2); opacity: 1; }

    #waveform.active .bar   { animation: wave 0.8s ease-in-out infinite; }
    #waveform.speaking .bar { animation: wave 0.5s ease-in-out infinite; }

    .bar:nth-child(1)  { animation-delay: 0.00s; }
    .bar:nth-child(2)  { animation-delay: 0.06s; }
    .bar:nth-child(3)  { animation-delay: 0.12s; }
    .bar:nth-child(4)  { animation-delay: 0.18s; }
    .bar:nth-child(5)  { animation-delay: 0.24s; }
    .bar:nth-child(6)  { animation-delay: 0.30s; }
    .bar:nth-child(7)  { animation-delay: 0.36s; }
    .bar:nth-child(8)  { animation-delay: 0.42s; }
    .bar:nth-child(9)  { animation-delay: 0.48s; }
    .bar:nth-child(10) { animation-delay: 0.54s; }
    .bar:nth-child(11) { animation-delay: 0.48s; }
    .bar:nth-child(12) { animation-delay: 0.42s; }
    .bar:nth-child(13) { animation-delay: 0.36s; }
    .bar:nth-child(14) { animation-delay: 0.30s; }
    .bar:nth-child(15) { animation-delay: 0.24s; }
    .bar:nth-child(16) { animation-delay: 0.18s; }
    .bar:nth-child(17) { animation-delay: 0.12s; }
    .bar:nth-child(18) { animation-delay: 0.06s; }
    .bar:nth-child(19) { animation-delay: 0.00s; }

    @keyframes wave {
      0%, 100% { height: 6px; }
      50%       { height: 42px; }
    }

    #status-text {
      font-size: 13px; font-weight: 500;
      color: var(--muted);
      letter-spacing: .3px;
      display: flex; align-items: center; gap: 8px;
      min-height: 20px;
    }

    /* Thinking dots */
    .thinking-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent2);
      margin: 0 2px;
      animation: dot-bounce 1.2s infinite;
    }
    .thinking-dots span:nth-child(2) { animation-delay: .2s; }
    .thinking-dots span:nth-child(3) { animation-delay: .4s; }

    @keyframes dot-bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .4; }
      40%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ── CHAT PANEL ──────────────────────────────────── */
    #chat-wrap {
      flex: 1;
      min-height: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #chat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 12px; font-weight: 600; color: var(--muted);
      letter-spacing: .5px; text-transform: uppercase;
      flex-shrink: 0;
    }

    #clear-btn {
      background: none; border: none;
      cursor: pointer; color: var(--muted);
      font-size: 11px; padding: 3px 8px;
      border-radius: var(--radius-sm);
      transition: all .2s;
    }
    #clear-btn:hover { background: var(--surface2); color: var(--text); }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 14px 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      height: 100%;
      color: var(--muted);
      font-size: 13px;
    }

    #empty-state .icon { font-size: 32px; opacity: .4; }

    .msg {
      display: flex;
      gap: 10px;
      animation: msg-in .25s ease;
    }

    @keyframes msg-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg.user .avatar {
      background: linear-gradient(135deg, #3b3b6e, #6c63ff);
    }

    .msg.ai .avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.55;
    }

    .msg.user .bubble {
      background: var(--user-bubble);
      border: 1px solid #2d2d5a;
      border-top-right-radius: 4px;
    }

    .msg.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    .msg .label {
      font-size: 10px; font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 4px;
      opacity: .55;
    }

    .msg.user .label { text-align: right; }

    /* ── FOOTER / CONTROLS ───────────────────────────── */
    footer {
      padding: 14px 0 18px;
      border-top: 1px solid var(--border);
    }

    #controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .ctrl-btn {
      display: flex; align-items: center; justify-content: center;
      border: none; cursor: pointer;
      border-radius: 50%;
      transition: all .2s;
      flex-shrink: 0;
    }

    #mic-btn {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      font-size: 26px;
      box-shadow: 0 0 24px var(--accent-glow);
    }

    #mic-btn:hover { transform: scale(1.06); box-shadow: 0 0 34px var(--accent-glow); }
    #mic-btn:active { transform: scale(.97); }

    #mic-btn.active {
      background: linear-gradient(135deg, #e84393, #f87171);
      box-shadow: 0 0 28px rgba(248, 113, 113, .45);
      animation: pulse-ring 1.5s infinite;
    }

    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(248,113,113,.6); }
      70%  { box-shadow: 0 0 0 14px rgba(248,113,113,0); }
      100% { box-shadow: 0 0 0 0 rgba(248,113,113,0); }
    }

    #interrupt-btn {
      width: 46px; height: 46px;
      background: var(--surface2);
      border: 1px solid var(--border);
      font-size: 18px;
      color: var(--text);
    }

    #interrupt-btn:hover { background: rgba(248,113,113,.15); border-color: var(--danger); }
    #interrupt-btn:disabled { opacity: .3; cursor: default; }

    #settings-btn {
      width: 46px; height: 46px;
      background: var(--surface2);
      border: 1px solid var(--border);
      font-size: 18px;
      color: var(--muted);
    }

    #settings-btn:hover { color: var(--text); background: var(--surface2); }

    .ctrl-label {
      font-size: 10px; color: var(--muted);
      text-align: center; margin-top: 5px;
      letter-spacing: .4px;
    }

    .ctrl-wrap { display: flex; flex-direction: column; align-items: center; }

    #status-bar {
      display: flex; align-items: center; justify-content: center;
      gap: 20px;
      margin-top: 10px;
      font-size: 11px;
      color: var(--muted);
    }

    .stat-item { display: flex; align-items: center; gap: 5px; }
    .stat-dot  { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
    .stat-dot.on { background: var(--success); box-shadow: 0 0 5px var(--success); }

    /* ── SETTINGS MODAL ──────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center; justify-content: center;
    }
    #modal-overlay.open { display: flex; }

    #modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      width: min(420px, calc(100vw - 32px));
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }

    #modal h2 { font-size: 17px; margin-bottom: 20px; color: var(--text); }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; letter-spacing: .4px; }
    .field input {
      width: 100%; padding: 10px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-size: 14px; outline: none;
      transition: border-color .2s;
    }
    .field input:focus { border-color: var(--accent); }

    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }

    .btn-secondary {
      padding: 9px 18px; border-radius: var(--radius-sm);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); font-size: 13px; cursor: pointer;
      transition: all .2s;
    }
    .btn-secondary:hover { color: var(--text); }

    .btn-primary {
      padding: 9px 20px; border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; color: #fff; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .2s;
      box-shadow: 0 0 14px var(--accent-glow);
    }
    .btn-primary:hover { transform: translateY(-1px); }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: .3; }
    }

    /* ── TOAST ───────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--border);
      padding: 10px 20px; border-radius: 30px;
      font-size: 13px; color: var(--text);
      opacity: 0; pointer-events: none;
      transition: opacity .3s;
      z-index: 200;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">🎙</div>
      <div class="logo-text">
        <span class="logo-title">Voice AI Agent</span>
        <span class="logo-sub">Powered by Groq · Sarvam · LangGraph</span>
      </div>
    </div>
    <div class="header-right">
      <span id="lang-badge">EN</span>
      <div id="conn-pill">
        <div id="conn-dot"></div>
        <span id="conn-label">Disconnected</span>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main>

    <!-- Visualizer -->
    <div id="vis-card">
      <div id="waveform">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div>
      </div>
      <div id="status-text">Press the mic button to start talking</div>
    </div>

    <!-- Chat -->
    <div id="chat-wrap">
      <div id="chat-header">
        <span>Conversation</span>
        <button id="clear-btn" onclick="clearChat()">Clear</button>
      </div>
      <div id="chat">
        <div id="empty-state">
          <div class="icon">💬</div>
          <span>Your conversation will appear here</span>
        </div>
      </div>
    </div>

  </main>

  <!-- FOOTER -->
  <footer>
    <div id="controls">
      <div class="ctrl-wrap">
        <button class="ctrl-btn" id="interrupt-btn" onclick="sendInterrupt()" title="Interrupt AI" disabled>⏹</button>
        <div class="ctrl-label">Interrupt</div>
      </div>

      <div class="ctrl-wrap">
        <button class="ctrl-btn" id="mic-btn" onclick="toggleMic()" title="Start / Stop">🎙</button>
        <div class="ctrl-label" id="mic-label">Start</div>
      </div>

      <div class="ctrl-wrap">
        <button class="ctrl-btn" id="settings-btn" onclick="openSettings()" title="Settings">⚙️</button>
        <div class="ctrl-label">Settings</div>
      </div>
    </div>

    <div id="status-bar">
      <div class="stat-item">
        <div class="stat-dot" id="dot-mic"></div>
        <span>Microphone</span>
      </div>
      <div class="stat-item">
        <div class="stat-dot" id="dot-ws"></div>
        <span>WebSocket</span>
      </div>
      <div class="stat-item">
        <div class="stat-dot" id="dot-ai"></div>
        <span>AI Active</span>
      </div>
    </div>
  </footer>

</div>

<!-- SETTINGS MODAL -->
<div id="modal-overlay" onclick="closeSettingsOutside(event)">
  <div id="modal">
    <h2>⚙️ Settings</h2>
    <div class="field">
      <label>BACKEND URL</label>
      <input id="cfg-url" type="text" placeholder="ws://localhost:8000/ws" />
    </div>
    <div class="field">
      <label>AUDIO CHUNK SIZE (samples)</label>
      <input id="cfg-chunk" type="number" value="4096" min="512" max="16384" />
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeSettings()">Cancel</button>
      <button class="btn-primary"   onclick="saveSettings()">Save & Reconnect</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════════ */
function defaultWsUrl() {
  // Auto-derive from page origin — works on localhost AND production (wss://)
  const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  const host  = window.location.host || 'localhost:8000';
  return `${proto}//${host}/ws`;
}

let config = {
  wsUrl:     localStorage.getItem('va_url')   || defaultWsUrl(),
  chunkSize: parseInt(localStorage.getItem('va_chunk') || '4096'),
};

/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
let ws            = null;
let audioCtx      = null;
let micStream     = null;
let scriptProc    = null;
let isListening   = false;
let aiSpeaking    = false;
let isThinking    = false;
let audioQueue    = [];
let audioPlaying  = false;
let currentSource = null;

/* ═══════════════════════════════════════════════════════
   UI HELPERS
═══════════════════════════════════════════════════════ */
function setConnPill(state, label) {
  const pill = document.getElementById('conn-pill');
  pill.className = state;
  document.getElementById('conn-label').textContent = label;
}

function setDot(id, on) {
  document.getElementById(id).classList.toggle('on', on);
}

function setStatus(html) {
  document.getElementById('status-text').innerHTML = html;
}

function setWaveform(mode) {
  // mode: '' | 'active' | 'speaking'
  document.getElementById('waveform').className = mode;
}

function showLangBadge(code) {
  const badge = document.getElementById('lang-badge');
  badge.style.display = 'block';
  badge.textContent = (code || '').replace('-', ' ').toUpperCase();
}

function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

/* ═══════════════════════════════════════════════════════
   CHAT
═══════════════════════════════════════════════════════ */
function clearChat() {
  const chat = document.getElementById('chat');
  chat.innerHTML = `
    <div id="empty-state">
      <div class="icon">💬</div>
      <span>Your conversation will appear here</span>
    </div>`;
}

function addMessage(role, text) {
  const chat = document.getElementById('chat');

  // Remove empty state
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();

  const isUser = role === 'user';
  const div = document.createElement('div');
  div.className = `msg ${isUser ? 'user' : 'ai'}`;
  div.innerHTML = `
    <div class="avatar">${isUser ? '🧑' : '🤖'}</div>
    <div class="bubble">
      <div class="label">${isUser ? 'You' : 'Assistant'}</div>
      <div>${escapeHtml(text)}</div>
    </div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ═══════════════════════════════════════════════════════
   AUDIO PLAYBACK (queued WAV chunks)
═══════════════════════════════════════════════════════ */
async function enqueueAudio(arrayBuffer) {
  audioQueue.push(arrayBuffer.slice(0)); // copy
  if (!audioPlaying) playNext();
}

async function playNext() {
  if (audioQueue.length === 0) {
    audioPlaying = false;
    return;
  }
  audioPlaying = true;

  const buf = audioQueue.shift();
  try {
    if (!audioCtx || audioCtx.state === 'closed') {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    const decoded = await audioCtx.decodeAudioData(buf);
    const src = audioCtx.createBufferSource();
    src.buffer = decoded;
    src.connect(audioCtx.destination);
    currentSource = src;
    src.onended = () => { currentSource = null; playNext(); };
    src.start(0);
  } catch (e) {
    console.warn('Audio decode error:', e);
    playNext();
  }
}

function stopAudio() {
  audioQueue = [];
  if (currentSource) {
    try { currentSource.stop(); } catch(_) {}
    currentSource = null;
  }
  audioPlaying = false;
}

/* ═══════════════════════════════════════════════════════
   AUDIO CAPTURE
═══════════════════════════════════════════════════════ */
function float32ToInt16(f32) {
  const buf = new Int16Array(f32.length);
  for (let i = 0; i < f32.length; i++) {
    let s = Math.max(-1, Math.min(1, f32[i]));
    buf[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
  }
  return buf;
}

async function startMic() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl:  true,
      }
    });
  } catch (e) {
    showToast('❌ Microphone permission denied');
    return false;
  }

  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  const source = audioCtx.createMediaStreamSource(micStream);
  scriptProc  = audioCtx.createScriptProcessor(config.chunkSize, 1, 1);

  scriptProc.onaudioprocess = (e) => {
    if (!isListening || !ws || ws.readyState !== WebSocket.OPEN) return;
    const f32  = e.inputBuffer.getChannelData(0);
    const i16  = float32ToInt16(f32);
    ws.send(i16.buffer);
  };

  source.connect(scriptProc);
  scriptProc.connect(audioCtx.destination);

  setDot('dot-mic', true);
  return true;
}

function stopMic() {
  if (scriptProc) { scriptProc.disconnect(); scriptProc = null; }
  if (micStream)  { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  setDot('dot-mic', false);
}

/* ═══════════════════════════════════════════════════════
   WEBSOCKET
═══════════════════════════════════════════════════════ */
function connectWS() {
  if (ws && ws.readyState < 2) ws.close();

  setConnPill('connecting', 'Connecting…');
  ws = new WebSocket(config.wsUrl);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    setConnPill('connected', 'Connected');
    setDot('dot-ws', true);
    // Send init metadata
    if (audioCtx) {
      ws.send(JSON.stringify({ type: 'init', sampleRate: audioCtx.sampleRate }));
    }
  };

  ws.onclose = (e) => {
    setConnPill('error', 'Disconnected');
    setDot('dot-ws', false);
    setDot('dot-ai', false);
    if (isListening) stopListening();
  };

  ws.onerror = () => {
    setConnPill('error', 'Connection failed');
    showToast('❌ Could not connect to backend at ' + config.wsUrl);
  };

  ws.onmessage = handleMessage;
}

function handleMessage(event) {
  if (event.data instanceof ArrayBuffer) {
    // Binary: WAV audio from AI
    enqueueAudio(event.data);
    return;
  }

  const raw = event.data;

  // "User: ..." or "AI: ..."
  if (raw.startsWith('User: ')) {
    addMessage('user', raw.slice(6));
    return;
  }
  if (raw.startsWith('AI: ')) {
    addMessage('ai', raw.slice(4));
    return;
  }

  // JSON control messages
  let msg;
  try { msg = JSON.parse(raw); } catch { return; }

  switch (msg.type) {

    case 'status':
      aiSpeaking = msg.ai_speaking;
      setDot('dot-ai', aiSpeaking);
      document.getElementById('interrupt-btn').disabled = !aiSpeaking;
      if (aiSpeaking) {
        setWaveform('speaking');
        setStatus('🔊 &nbsp;AI is speaking…');
      } else {
        setWaveform(isListening ? 'active' : '');
        setStatus(isListening ? '🎤 &nbsp;Listening…' : 'Press the mic button to start talking');
      }
      break;

    case 'thinking':
      isThinking = msg.active;
      if (isThinking) {
        setWaveform('');
        setStatus(`Processing <span class="thinking-dots"><span></span><span></span><span></span></span>`);
      } else {
        setWaveform(isListening ? 'active' : '');
        setStatus(isListening ? '🎤 &nbsp;Listening…' : 'Press the mic button to start talking');
      }
      break;

    case 'language':
      showLangBadge(msg.code);
      break;

    case 'barge_in':
      stopAudio();
      setStatus('🎤 &nbsp;Listening…');
      setWaveform('active');
      break;

    case 'interrupted':
      stopAudio();
      setStatus(isListening ? '🎤 &nbsp;Listening…' : 'Press the mic button to start talking');
      setWaveform(isListening ? 'active' : '');
      setDot('dot-ai', false);
      aiSpeaking = false;
      document.getElementById('interrupt-btn').disabled = true;
      break;

    case 'timeout':
      showToast('⏱ Session timed out due to inactivity');
      stopListening();
      break;
  }
}

/* ═══════════════════════════════════════════════════════
   MIC TOGGLE
═══════════════════════════════════════════════════════ */
async function toggleMic() {
  if (isListening) {
    stopListening();
  } else {
    await startListening();
  }
}

async function startListening() {
  const micOk = await startMic();
  if (!micOk) return;

  connectWS();

  isListening = true;

  // Wait briefly for WS to open then send init
  setTimeout(() => {
    if (ws && ws.readyState === WebSocket.OPEN && audioCtx) {
      ws.send(JSON.stringify({ type: 'init', sampleRate: audioCtx.sampleRate }));
    }
  }, 400);

  document.getElementById('mic-btn').classList.add('active');
  document.getElementById('mic-btn').textContent = '⏹';
  document.getElementById('mic-label').textContent = 'Stop';
  setWaveform('active');
  setStatus('🎤 &nbsp;Listening…');
}

function stopListening() {
  isListening = false;
  stopMic();
  stopAudio();

  if (ws && ws.readyState < 2) ws.close();

  document.getElementById('mic-btn').classList.remove('active');
  document.getElementById('mic-btn').textContent = '🎙';
  document.getElementById('mic-label').textContent = 'Start';
  document.getElementById('interrupt-btn').disabled = true;

  setWaveform('');
  setStatus('Press the mic button to start talking');
  setDot('dot-ws', false);
  setDot('dot-ai', false);
  setConnPill('', 'Disconnected');
}

/* ═══════════════════════════════════════════════════════
   INTERRUPT
═══════════════════════════════════════════════════════ */
function sendInterrupt() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'interrupt' }));
    stopAudio();
  }
}

/* ═══════════════════════════════════════════════════════
   SETTINGS MODAL
═══════════════════════════════════════════════════════ */
function openSettings() {
  document.getElementById('cfg-url').value   = config.wsUrl;
  document.getElementById('cfg-chunk').value = config.chunkSize;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeSettings() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function closeSettingsOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeSettings();
}

function saveSettings() {
  config.wsUrl   = document.getElementById('cfg-url').value.trim()   || config.wsUrl;
  config.chunkSize = parseInt(document.getElementById('cfg-chunk').value) || config.chunkSize;
  localStorage.setItem('va_url',   config.wsUrl);
  localStorage.setItem('va_chunk', config.chunkSize);
  closeSettings();
  showToast('✅ Settings saved');
  if (isListening) {
    stopListening();
    showToast('Reconnect to apply new settings');
  }
}

/* ═══════════════════════════════════════════════════════
   KEYBOARD SHORTCUTS
═══════════════════════════════════════════════════════ */
document.addEventListener('keydown', (e) => {
  // Space → toggle mic (when no input focused)
  if (e.code === 'Space' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    toggleMic();
  }
  // Escape → interrupt
  if (e.code === 'Escape') {
    if (aiSpeaking) sendInterrupt();
    closeSettings();
  }
});

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
// Show keyboard shortcuts hint
setTimeout(() => {
  showToast('Tip: Press Space to start / stop · Esc to interrupt AI', 4000);
}, 1200);
</script>
